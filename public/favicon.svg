<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges"> <rect width="32" height="32" fill="#000000"/> <!-- Hat --> <rect x="10" y="3" width="12" height="1" fill="#bdbdbd"/> <rect x="9" y="4" width="14" height="2" fill="#ffffff"/> <rect x="6" y="8" width="20" height="1" fill="#ffffff"/> <!-- Hair --> <rect x="10" y="10" width="2" height="1" fill="#ffffff"/> <rect x="20" y="10" width="2" height="1" fill="#ffffff"/> <!-- Side hair left --> <rect x="7" y="11" width="2" height="1" fill="#ffffff"/> <rect x="6" y="12" width="2" height="1" fill="#ffffff"/> <rect x="7" y="13" width="1" height="2" fill="#ffffff"/> <rect x="6" y="15" width="1" height="2" fill="#ffffff"/> <rect x="8" y="17" width="1" height="2" fill="#ffffff"/> <rect x="7" y="20" width="1" height="1" fill="#ffffff"/> <!-- Side hair right --> <rect x="23" y="11" width="2" height="1" fill="#ffffff"/> <rect x="24" y="12" width="2" height="1" fill="#ffffff"/> <rect x="24" y="13" width="1" height="2" fill="#ffffff"/> <rect x="25" y="15" width="1" height="2" fill="#ffffff"/> <rect x="23" y="17" width="1" height="2" fill="#ffffff"/> <rect x="24" y="20" width="1" height="1" fill="#ffffff"/> <!-- Face --> <rect x="10" y="10" width="12" height="12" fill="#ffffff"/> <!-- Forehead shadow --> <rect x="11" y="10" width="8" height="2" fill="#d0d0d0"/> <!-- Glasses --> <rect x="10" y="13" width="5" height="4" fill="#000000"/> <rect x="17" y="13" width="5" height="4" fill="#000000"/> <rect x="15" y="14" width="2" height="1" fill="#000000"/> <!-- Lens highlights --> <rect x="11" y="14" width="2" height="2" fill="#ececec"/> <rect x="18" y="14" width="2" height="2" fill="#ececec"/> <!-- Nose --> <rect x="15" y="15" width="2" height="5" fill="#d9d9d9"/> <!-- Mouth --> <rect x="13" y="20" width="5" height="1" fill="#000000"/> <!-- Chin --> <rect x="12" y="22" width="8" height="2" fill="#ffffff"/> <rect x="13" y="24" width="6" height="1" fill="#ffffff"/> <!-- Burn / corruption --> <rect x="20" y="11"